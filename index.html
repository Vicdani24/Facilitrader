     <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Meu FIFA - Analisador Over 0.5 HT</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

header{
    text-align:center;
    margin-bottom:30px;
}

header h1{
    font-size:38px;
    color:#38bdf8;
}

header p{
    color:#cbd5e1;
    margin-top:8px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
}

button{
    background:#38bdf8;
    color:#000;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

#status{
    color:#facc15;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    border:1px solid #334155;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-3px);
}

.league{
    color:#38bdf8;
    font-size:14px;
    margin-bottom:10px;
}

.teams{
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.info{
    margin:8px 0;
    color:#e2e8f0;
}

.percent-box{
    margin-top:20px;
}

.percent-title{
    margin-bottom:8px;
}

.progress{
    width:100%;
    height:22px;
    background:#334155;
    border-radius:30px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    border-radius:30px;
    text-align:center;
    font-weight:bold;
    line-height:22px;
    color:black;
}

.green{
    background:#22c55e;
}

.yellow{
    background:#facc15;
}

.red{
    background:#ef4444;
}

.high{
    color:#22c55e;
    font-weight:bold;
}

.medium{
    color:#facc15;
    font-weight:bold;
}

.low{
    color:#ef4444;
    font-weight:bold;
}

footer{
    text-align:center;
    margin-top:40px;
    color:#94a3b8;
}

</style>
</head>
<body>

<div class="container">

<header>
    <h1>OVER 0.5 HT ANALYZER</h1>
    <p>Analisador de gols no primeiro tempo</p>
</header>

<div class="topbar">
    <button onclick="loadGames()">
        ANALISAR JOGOS DE HOJE
    </button>

    <div id="status">
        Aguardando análise...
    </div>
</div>

<div class="games" id="gamesContainer"></div>

<footer>
    Desenvolvido para análise estatística de Over 0.5 HT
</footer>

</div>

<script>

/*

=========================================================
IMPORTANTE
=========================================================

PARA FUNCIONAR COM JOGOS REAIS VOCÊ PRECISA:

1 - Criar conta em uma API de futebol:

https://www.api-football.com/

OU

https://www.football-data.org/

2 - PEGAR SUA API KEY

3 - SUBSTITUIR AQUI:

const API_KEY = "SUA_API_KEY";

=========================================================

*/

const API_KEY = "SUA_API_KEY";

const statusText = document.getElementById("status");
const gamesContainer = document.getElementById("gamesContainer");

async function loadGames(){

    gamesContainer.innerHTML = "";
    statusText.innerHTML = "Buscando jogos do dia...";

    try{

        const today = new Date().toISOString().split("T")[0];

        const response = await fetch(
            `https://v3.football.api-sports.io/fixtures?date=${today}`,
            {
                method:"GET",
                headers:{
                    "x-apisports-key":API_KEY
                }
            }
        );

        const data = await response.json();

        const games = data.response;

        statusText.innerHTML = `${games.length} jogos encontrados`;

        for(const game of games){

            const home = game.teams.home.name;
            const away = game.teams.away.name;
            const league = game.league.name;

            /*
            ======================================
            SIMULAÇÃO DE IA / ESTATÍSTICA
            ======================================

            Aqui calculamos uma porcentagem baseada
            em lógica estatística simulada.

            Você poderá futuramente integrar:
            - média HT
            - over HT %
            - gols marcados
            - gols sofridos
            - forma recente
            - ataques perigosos
            ======================================
            */

            const percent = calculateHTProbability();

            createGameCard(
                league,
                home,
                away,
                percent
            );

        }

    }catch(error){

        console.log(error);

        statusText.innerHTML = "Erro ao carregar jogos.";

    }

}

function calculateHTProbability(){

    /*
    =========================================
    IA SIMULADA
    =========================================

    Depois você pode trocar isso por
    cálculos reais.

    =========================================
    */

    return Math.floor(Math.random() * 41) + 55;

}

function createGameCard(league, home, away, percent){

    let colorClass = "red";
    let recommendation = "RISCO";

    if(percent >= 75){
        colorClass = "green";
        recommendation = "EXCELENTE";
    }
    else if(percent >= 65){
        colorClass = "yellow";
        recommendation = "BOA";
    }

    const card = document.createElement("div");

    card.classList.add("card");

    card.innerHTML = `

        <div class="league">
            ${league}
        </div>

        <div class="teams">
            ${home} x ${away}
        </div>

        <div class="info">
            Probabilidade Over 0.5 HT:
        </div>

        <div class="percent-box">

            <div class="percent-title ${colorClass}">
                ${percent}% - ${recommendation}
            </div>

            <div class="progress">

                <div 
                    class="progress-bar ${colorClass}"
                    style="width:${percent}%"
                >
                    ${percent}%
                </div>

            </div>

        </div>

    `;

    gamesContainer.appendChild(card);

}

</script>

</body>
</html>
